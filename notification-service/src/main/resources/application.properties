spring.application.name=notification-service
server.port=8085

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Kafka Bootstrap
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Key Deserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value Deserializer (Safely wrapped to catch package resolution issues)
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages so it maps to your local notification-service DTOs
spring.kafka.properties.spring.json.trusted.packages=*
# Maps the incoming package types directly to your local DTO target classes
spring.kafka.properties.spring.json.value.default.type=com.fooddelivery.notification.dto.OrderPlacedEvent
# Alternatively, explicit structural mappings to handle both topics in one consumer:
spring.kafka.properties.spring.json.type.mapping=com.fooddelivery.order.dto.OrderPlacedEvent:com.fooddelivery.notification.dto.OrderPlacedEvent,com.fooddelivery.order.dto.OrderDeliveredEvent:com.fooddelivery.notification.dto.OrderDeliveredEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false